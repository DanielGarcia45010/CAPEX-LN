<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPEX Engine | Liberty Networks</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    display:flex;
    font-family:'Segoe UI', sans-serif;
    background:#050b18;
    color:#e5e7eb;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:260px;
    background:#1e1f26;
    height:100vh;
    padding:25px;
}

.sidebar h3{
    color:#a1a1aa;
    margin-bottom:20px;
}

.menu-item{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
    cursor:pointer;
    color:#d4d4d8;
}

.menu-item.active{
    color:white;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    border:2px solid #555;
}

.menu-item.active .dot{
    background:#ff5c2c;
    border:none;
}

/* ===== MAIN CONTENT ===== */
.main{
    flex:1;
    padding:50px 80px;
}

/* ===== HEADER ===== */
.title{
    font-size:2.5em;
    font-weight:800;
    margin-bottom:40px;
}

/* ===== SECTIONS ===== */
.section{
    margin-bottom:30px;
}

.section h2{
    font-size:2em;
    margin-bottom:20px;
}

/* ===== INPUTS ===== */
.input-group{
    margin-bottom:20px;
}

.label{
    margin-bottom:6px;
    color:#cbd5f5;
}

.input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:linear-gradient(90deg,#1f2937,#2a2f3a);
    color:white;
}

.input:focus{
    outline:none;
    box-shadow:0 0 0 2px #ff6a00;
}

/* ===== BUTTON ===== */
.btn{
    background:#0f172a;
    border:1px solid #374151;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.btn:hover{
    border-color:#ff6a00;
}

/* ===== SCORE ===== */
.score{
    margin-top:30px;
}

.score label{
    color:#9ca3af;
    font-size:.9em;
}

.score h1{
    font-size:3em;
    margin-top:5px;
}

/* ===== MAP ===== */
.map{
    margin-top:30px;
    height:400px;
    border-radius:12px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#666;
}

/* ===== FEASIBILITY ===== */
.feasibility{
    margin-top:30px;
}

.feasibility p{
    margin:10px 0;
}

.highlight{
    color:#22c55e;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Menú</h3>

    <div class="menu-item active">
        <div class="dot"></div>
        Cotización
    </div>

    <div class="menu-item">
        <div class="dot"></div>
        Factibilidad
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="title">
        🚀 CAPEX ENGINE
    </div>

    <div class="section">
        <h2>📍 Cotización</h2>

        <div class="input-group">
            <div class="label">Dirección o coordenadas</div>
            <input class="input" placeholder="Chapínero Bogotá">
        </div>

        <div class="input-group">
            <div class="label">💰 MRC</div>
            <input class="input" value="331200">
        </div>

        <button class="btn">Analizar cotización</button>

        <div class="score">
            <label>CAPEX SCORE</label>
            <h1>1.1237</h1>
        </div>

        <div class="map">
            MAPA CORPORATIVO (Leaflet aquí)
        </div>
    </div>

    <div class="section">
        <h2>💰 Factibilidad</h2>

        <div class="feasibility">
            <p>📍 Ciudad: Upzs Localidad Chapinero</p>
            <p>📏 Distancia: 0.00 m</p>
            <p>💵 Valor unitario: $10,500 COP/m</p>

            <div class="input-group">
                <div class="label">MRC</div>
                <input class="input" value="331200">
            </div>

            <div class="input-group">
                <div class="label">NRC</div>
                <input class="input" value="0">
            </div>

            <div class="input-group">
                <div class="label">Term (meses)</div>
                <input class="input" value="24">
            </div>

            <div class="input-group">
                <div class="label">Costo de Obras</div>
                <input class="input" value="0">
            </div>

            <p class="highlight">✅ Factibilidad positiva</p>
        </div>
    </div>

</div>

</body>
</html>
